version: 0.2

env:
  variables:
    ENV_NAME: dev

phases:
  install:
    runtime-versions:
      python: 3.11

  pre_build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=$AWS_DEFAULT_REGION
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.$REGION.amazonaws.com
      - FRONTEND_REPOSITORY_URI=${ACCOUNT_ID}.dkr.ecr.$REGION.amazonaws.com/${ENV_NAME}-frontend-repository
      - FRONTEND_IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - API_REPOSITORY_URI=${ACCOUNT_ID}.dkr.ecr.$REGION.amazonaws.com/${ENV_NAME}-api-repository
      - API_IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - WORKER_REPOSITORY_URI=${ACCOUNT_ID}.dkr.ecr.$REGION.amazonaws.com/${ENV_NAME}-worker-repository
      - WORKER_IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - |
        cat > dev_params.json <<EOF
        [ 
          { "ParameterKey": "EnvironmentName", "ParameterValue": "dev" },
          { "ParameterKey": "VpcCidr", "ParameterValue": "10.4.0.0/16" },
          { "ParameterKey": "PublicSubnet1Cidr", "ParameterValue": "10.4.1.0/24" },
          { "ParameterKey": "PublicSubnet2Cidr", "ParameterValue": "10.4.2.0/24" },
          { "ParameterKey": "PrivateSubnet1Cidr", "ParameterValue": "10.4.3.0/24" },
          { "ParameterKey": "PrivateSubnet2Cidr", "ParameterValue": "10.4.4.0/24" },
          { "ParameterKey": "GitHubRepo", "ParameterValue": "ECS-CICD" },
          { "ParameterKey": "GitHubOwner", "ParameterValue": "Azamcloudspace" },
          { "ParameterKey": "CodeStarConnectionArn", "ParameterValue": "arn:aws:codeconnections:eu-central-1:760773573647:connection/0e242b5e-22d9-4a97-8909-78ce7101355b" },
          { "ParameterKey": "FrontendImageTag", "ParameterValue": "$FRONTEND_IMAGE_TAG" },
          { "ParameterKey": "ApiImageTag", "ParameterValue": "$API_IMAGE_TAG" },
          { "ParameterKey": "WorkerImageTag", "ParameterValue": "$WORKER_IMAGE_TAG" }
        ]
        EOF


  build:
    commands:
      - echo "Uploading nested stack templates to S3..."
      - aws s3 sync cloudformation/child-templates/ s3://iac-bucket-azamclouds/
      - aws cloudformation deploy --template-file cloudformation/ecr-template.yaml --role-arn arn:aws:iam::$ACCOUNT_ID:role/cloudformationrole --stack-name ${ENV_NAME}-ECR --capabilities CAPABILITY_NAMED_IAM --parameter-overrides file://dev_params.json --region $REGION
      - docker build -f app/frontend/indexDockerfile.dockerfile -t $FRONTEND_REPOSITORY_URI:$FRONTEND_IMAGE_TAG .
      - docker push $FRONTEND_REPOSITORY_URI:$FRONTEND_IMAGE_TAG
      - docker build -f app/api/appDockerfile.dockerfile -t $API_REPOSITORY_URI:$API_IMAGE_TAG .
      - docker push $API_REPOSITORY_URI:$API_IMAGE_TAG
      - docker build -f app/worker/workerDockerfile.dockerfile -t $WORKER_REPOSITORY_URI:$WORKER_IMAGE_TAG .
      - docker push $WORKER_REPOSITORY_URI:$WORKER_IMAGE_TAG
      - aws cloudformation deploy --template-file cloudformation/master/master.yaml --role-arn arn:aws:iam::$ACCOUNT_ID:role/cloudformationrole --stack-name ${ENV_NAME}-Ecs-Cicd --capabilities CAPABILITY_NAMED_IAM --parameter-overrides file://dev_params.json --region $REGION


artifacts:
  files:
    - '**/*'
